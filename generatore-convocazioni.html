<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generatore Convocazioni — PC ANA Casale Monferrato</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --verde: #2d5a27;
    --verde-light: #4a7c42;
    --verde-bg: #f0f5ef;
    --oro: #b8860b;
    --oro-light: #f0d060;
    --grigio: #6b7280;
    --bordo: #d1d5db;
    --bianco: #ffffff;
    --testo: #1f2937;
    --errore: #dc2626;
    --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
    --radius: 8px;
  }

  body {
    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
    background: #f3f4f6;
    color: var(--testo);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--verde);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow-md);
  }
  .logo-text { flex: 1; }
  .logo-text h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
  .logo-text p { font-size: 11px; opacity: .75; margin-top: 2px; }
  .badge {
    background: var(--oro);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: .05em;
  }

  /* ── LAYOUT ── */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 0;
    height: calc(100vh - 56px);
    overflow: hidden;
  }

  /* ── FORM PANEL ── */
  .form-panel {
    background: var(--bianco);
    border-right: 1px solid var(--bordo);
    overflow-y: auto;
    padding: 20px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--grigio);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--bordo);
  }
  .form-group { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--testo);
    margin-bottom: 4px;
  }
  input, select, textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--bordo);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
    color: var(--testo);
    background: var(--bianco);
    transition: border-color .15s, box-shadow .15s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--verde-light);
    box-shadow: 0 0 0 3px rgba(74,124,66,.15);
  }
  textarea { resize: vertical; min-height: 90px; line-height: 1.5; }

  .odg-list { list-style: none; margin-bottom: 8px; }
  .odg-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    background: var(--verde-bg);
    border-radius: 6px;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .odg-item span { flex: 1; }
  .odg-drag { cursor: grab; color: var(--grigio); font-size: 14px; }
  .odg-del {
    background: none; border: none; cursor: pointer;
    color: var(--errore); font-size: 14px; padding: 0 2px;
    opacity: .7;
  }
  .odg-del:hover { opacity: 1; }
  .odg-add {
    display: flex; gap: 6px;
  }
  .odg-add input { flex: 1; }
  .btn-add {
    background: var(--verde-bg);
    border: 1px solid var(--verde-light);
    color: var(--verde);
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    white-space: nowrap;
  }
  .btn-add:hover { background: #ddebd8; }

  .divider { height: 1px; background: var(--bordo); margin: 18px 0; }

  .btn-genera {
    width: 100%;
    padding: 11px;
    background: var(--verde);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: .02em;
    transition: background .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-genera:hover { background: var(--verde-light); }
  .btn-genera:disabled { opacity: .5; cursor: not-allowed; }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    color: var(--errore);
    font-size: 12px;
    padding: 8px 10px;
    background: #fef2f2;
    border: 1px solid #fca5a5;
    border-radius: 6px;
    margin-top: 10px;
    display: none;
  }

  /* ── ANTEPRIMA PANEL ── */
  .preview-panel {
    background: #e5e7eb;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 16px;
  }
  .preview-toolbar {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 680px;
    justify-content: flex-end;
  }
  .btn-pdf {
    background: var(--oro);
    color: #000;
    border: none;
    padding: 9px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background .15s;
    display: none;
  }
  .btn-pdf:hover { background: #d4a017; }

  .preview-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: #9ca3af;
    gap: 12px;
    text-align: center;
    padding: 40px;
  }
  .preview-placeholder svg { opacity: .3; }
  .preview-placeholder p { font-size: 14px; }

  /* ── FOGLIO A4 ── */
  .a4 {
    width: 680px;
    min-height: 960px;
    background: white;
    box-shadow: var(--shadow-md);
    border-radius: 4px;
    padding: 40px 50px;
    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: #222;
    display: none;
  }

  /* intestazione documento */
  .doc-header {
    text-align: center;
    padding-bottom: 4px;
    margin-bottom: 14px;
    font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
  }
  .doc-logos {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    padding: 0 10px;
  }
  .doc-logos img { height: 65px; width: auto; object-fit: contain; }
  .doc-ente-line { font-size: 12px; font-weight: 700; letter-spacing: .02em; color: #000; margin-top: 4px; }
  .doc-medaglia { font-size: 11px; font-weight: 700; color: #000; margin-top: 1px; }
  .doc-unita-big { font-size: 17px; font-weight: 700; color: #000; margin-top: 3px; letter-spacing: .01em; }
  .doc-indirizzo-line { font-size: 11px; color: #000; margin-top: 3px; }
  .doc-contatti-line { font-size: 11px; color: #000; margin-top: 1px; }
  .doc-separator { border-top: 1.5px solid #000; margin-top: 6px; }

  .doc-data { text-align: right; margin-bottom: 14px; font-size: 13px; color: #555; }

  .doc-dest { margin-bottom: 16px; font-size: 13px; text-align: right; margin-left: 45%; }
  .doc-dest .dest-row { margin-bottom: 2px; }
  .doc-dest .pc { font-style: italic; }
  .doc-dest .llss { font-style: normal; }

  .doc-oggetto { font-weight: 700; margin-bottom: 16px; font-size: 13px; }

  .doc-corpo { margin-bottom: 12px; text-align: justify; font-size: 13px; }

  .doc-data-riunione {
    text-align: center;
    font-size: 36px;
    font-weight: 700;
    color: #000;
    margin: 20px 0 14px;
    letter-spacing: .02em;
  }

  .doc-titolo-riunione { text-align: justify; margin-bottom: 16px; font-size: 13px; }

  .doc-odg-title { font-weight: 700; margin-bottom: 8px; font-size: 13px; }
  .doc-odg { margin-left: 20px; margin-bottom: 16px; font-size: 13px; }
  .doc-odg li { margin-bottom: 4px; }

  .doc-chiusura { text-align: justify; font-size: 13px; margin-bottom: 8px; }
  .doc-saluto { font-size: 13px; margin-bottom: 28px; }

  .doc-firma { text-align: right; font-size: 13px; }
  .doc-firma .ruolo { font-weight: 700; }
  .doc-firma .nome { margin-top: 4px; font-style: normal; }

  /* ── AUTH GUARD ── */
  #authGuard {
    position: fixed; inset: 0;
    background: linear-gradient(135deg, #1a3a5c 0%, #2d6a4f 100%);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; color: white; font-family: 'Calibri', sans-serif;
    font-size: 1.1rem; gap: 12px;
  }
  .auth-spinner {
    width: 22px; height: 22px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin .7s linear infinite;
  }
</style>

<script>
// ── ODG ────────────────────────────────────────────────────────────────────
let odgItems = ['Varie ed Eventuali'];

function renderOdg() {
  const list = document.getElementById('odg-list');
  list.innerHTML = '';
  odgItems.forEach((item, i) => {
    const li = document.createElement('li');
    li.className = 'odg-item';
    li.innerHTML = `
      <span class="odg-drag">⠿</span>
      <span>${item}</span>
      <button class="odg-del" onclick="removeOdg(${i})">✕</button>
    `;
    list.appendChild(li);
  });
}

function addOdg() {
  const inp = document.getElementById('odg-input');
  const val = inp.value.trim();
  if (!val) return;
  // Inserisci prima di "Varie ed Eventuali" se esiste, altrimenti in fondo
  const varieIdx = odgItems.findIndex(x => x.toLowerCase().includes('varie'));
  if (varieIdx >= 0) odgItems.splice(varieIdx, 0, val);
  else odgItems.push(val);
  inp.value = '';
  renderOdg();
}

function removeOdg(i) {
  odgItems.splice(i, 1);
  renderOdg();
}

// ── INIT DATA ──────────────────────────────────────────────────────────────
(function init() {
  const oggi = new Date().toISOString().split('T')[0];
  document.getElementById('data-lettera').value = oggi;

  // Pre-popola ODG in base al tipo default
  odgItems = ['Adunata di Genova','Prossimi Impegni','25° Anniversario Unità','Varie ed Eventuali'];
  renderOdg();

  document.getElementById('tipo').addEventListener('change', function() {
    document.getElementById('wrap-tipo-custom').style.display = this.value === 'altro' ? '' : 'none';
    presetOdg(this.value);
  });
  // Ripristina luogo salvato
  const luogoSalvato = localStorage.getItem('luogo_custom');
  if (luogoSalvato) {
    document.getElementById('luogo').value = 'altro';
    document.getElementById('wrap-luogo-custom').style.display = '';
    document.getElementById('luogo-custom').value = luogoSalvato;
  }

  document.getElementById('luogo').addEventListener('change', function() {
    document.getElementById('wrap-luogo-custom').style.display = this.value === 'altro' ? '' : 'none';
    if (this.value !== 'altro') localStorage.removeItem('luogo_custom');
  });
  document.getElementById('luogo-custom').addEventListener('input', function() {
    if (this.value.trim()) localStorage.setItem('luogo_custom', this.value.trim());
    else localStorage.removeItem('luogo_custom');
  });
  document.getElementById('dest-a').addEventListener('change', function() {
    document.getElementById('wrap-dest-a-custom').style.display = this.value === 'Altro' ? '' : 'none';
  });
  document.getElementById('dest-pc').addEventListener('change', function() {
    document.getElementById('wrap-dest-pc-custom').style.display = this.value === 'Altro' ? '' : 'none';
  });
})();

function presetOdg(tipo) {
  if (tipo === 'commissione') {
    odgItems = ["Stato dell'Unità",'Adunata di Genova','Prossimi Impegni','25° Anniversario Unità','Nuovo Portale Interventi','Varie ed Eventuali'];
  } else if (tipo === 'squadre') {
    odgItems = ['Adunata di Genova','Prossimi Impegni','25° Anniversario Unità','Varie ed Eventuali'];
  } else if (tipo === 'assemblea') {
    odgItems = ['Relazione annuale Coordinatore','Approvazione bilancio','Elezioni cariche sociali','Varie ed Eventuali'];
  } else {
    odgItems = ['Varie ed Eventuali'];
  }
  renderOdg();
}

// ── GENERA ─────────────────────────────────────────────────────────────────
function genera() {
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  const tipo = document.getElementById('tipo').value;
  const tipoCustom = document.getElementById('tipo-custom').value.trim();
  const dataRiunioneRaw = document.getElementById('data-riunione').value;
  const dataLetteraRaw = document.getElementById('data-lettera').value;
  const destA = document.getElementById('dest-a').value === 'Altro'
    ? document.getElementById('dest-a-custom').value.trim()
    : document.getElementById('dest-a').value;
  const destPc = document.getElementById('dest-pc').value === 'Altro'
    ? document.getElementById('dest-pc-custom').value.trim()
    : document.getElementById('dest-pc').value;
  const note = document.getElementById('note').value.trim();

  if (!dataRiunioneRaw) { showError('Inserisci la data della riunione.'); return; }
  if (odgItems.length === 0) { showError("Aggiungi almeno una voce all'ordine del giorno."); return; }

  // Luogo
  const luogoVal = document.getElementById('luogo').value;
  const luogoCustom = document.getElementById('luogo-custom').value.trim();
  const luogoStr = luogoVal === 'altro' && luogoCustom
    ? luogoCustom
    : 'la Sede della Sezione Alpini di Casale Monferrato in via T. de Cristoforis 16';

  const dataLettera = formatDateIT(dataLetteraRaw || new Date().toISOString().split('T')[0]);
  const dataRiunione = formatDateIT(dataRiunioneRaw);
  const giornoSett = dayName(dataRiunioneRaw);
  const dataGrande = (giornoSett + ' ' + dataRiunione).toUpperCase();

  const templates = {
    commissione: {
      oggetto: 'Convocazione Commissione di Unità.',
      testoIntro: 'Viene convocata la Commissione di Unità presso ' + luogoStr + ', per il giorno',
      titoloRiunione: "la riunione della Commissione di Unità di Protezione Civile A.N.A. della Sezione di Casale Monferrato."
    },
    squadre: {
      oggetto: 'Convocazione Riunione a Squadre Congiunte.',
      testoIntro: 'Viene convocata la riunione a Squadre Congiunte presso ' + luogoStr + ', per il giorno',
      titoloRiunione: "la riunione a Squadre Congiunte dell'Unità di Protezione Civile A.N.A. della Sezione di Casale Monferrato."
    },
    assemblea: {
      oggetto: "Assemblea Generale Annuale dell'Unità.",
      testoIntro: 'Viene fissata, presso ' + luogoStr + ', per il giorno',
      titoloRiunione: "l'Assemblea Annuale Ordinaria dei Volontari dell'Unità di Protezione Civile A.N.A. della Sezione di Casale Monferrato."
    },
    altro: {
      oggetto: 'Convocazione ' + (tipoCustom || 'Riunione') + '.',
      testoIntro: 'Viene convocata la riunione presso ' + luogoStr + ', per il giorno',

    }
  };

  const tpl = templates[tipo] || templates.altro;
  let titoloRiunione = tpl.titoloRiunione;
  if (note) titoloRiunione += '<br><br>' + note;

  renderPreview({
    dataLettera, destA, destPc,
    oggetto: tpl.oggetto,
    testoIntro: tpl.testoIntro,
    dataGrande, titoloRiunione,
    odg: odgItems,
  });
}

function formatDateIT(str) {
  if (!str) return '';
  const [y, m, d] = str.split('-');
  const mesi = ['','gennaio','febbraio','marzo','aprile','maggio','giugno',
                'luglio','agosto','settembre','ottobre','novembre','dicembre'];
  return `${parseInt(d)} ${mesi[parseInt(m)]} ${y}`;
}

function dayName(str) {
  if (!str) return '';
  const giorni = ['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
  const d = new Date(str + 'T12:00:00');
  return giorni[d.getDay()];
}
